<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>每日全网热点热榜</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f2f4f6;
    padding: 20px;
  }
  .page-title {
    text-align: center;
    font-size: 24px;
    margin-bottom: 6px;
    color: #222;
  }
  .tip {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
  }
  .hot-wrapper {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    max-width: 800px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hot-item {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f2f2f2;
  }
  .hot-item:last-child {
    border-bottom: none;
  }
  .num {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: #f5f5f5;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: bold;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .num.top1 { background: #ff3636; color: #fff; }
  .num.top2 { background: #ff7d00; color: #fff; }
  .num.top3 { background: #00c8c8; color: #fff; }
  .text {
    flex: 1;
    font-size: 15px;
    color: #222;
    line-height: 1.4;
  }
  .hot {
    font-size: 12px;
    color: #999;
    margin-left: 8px;
    white-space: nowrap;
  }
  a {
    color: inherit;
    text-decoration: none;
  }
  .loading {
    padding: 20px 0;
    text-align: center;
    color: #666;
    font-size: 14px;
  }
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #999;
  }
</style>
</head>

<body>
  <h1 class="page-title">📛 全网实时热点</h1>
  <div class="tip">微博 | 抖音 | B站 | 小红书 · 每10分钟自动更新</div>

  <div class="hot-wrapper">
    <!-- 微博 -->
    <div class="card">
      <div class="card-title">🔴 微博热搜</div>
      <div id="weibo" class="list">加载中...</div>
    </div>

    <!-- 抖音 -->
    <div class="card">
      <div class="card-title">🟢 抖音热榜</div>
      <div id="douyin" class="list">加载中...</div>
    </div>

    <!-- B站 -->
    <div class="card">
      <div class="card-title">🔵 B站热门</div>
      <div id="bilibili" class="list">加载中...</div>
    </div>

    <!-- 小红书 -->
    <div class="card">
      <div class="card-title">🟡 小红书热门</div>
      <div id="xiaohongshu" class="list">加载中...</div>
    </div>
  </div>

  <div class="footer">热点来源：平台公开榜单 · 自动刷新</div>

<script>
  // 每10分钟刷新一次
  const REFRESH_MIN = 10
  const REFRESH_TIME = REFRESH_MIN * 60 * 1000

  // 跨域代理（解决GitHub Pages跨域问题）
  const CORS_PROXY = "https://api.allorigins.win/raw?url="

  // 渲染一条热点
  function renderItem(i, title, hot, link) {
    let cls = ""
    if (i === 0) cls = "top1"
    else if (i === 1) cls = "top2"
    else if (i === 2) cls = "top3"

    return `
      <a href="${link}" target="_blank">
        <div class="hot-item">
          <span class="num ${cls}">${i + 1}</span>
          <div class="text">${title}</div>
          <div class="hot">${hot || ""}</div>
        </div>
      </a>
    `
  }

  // 微博（JSONP跨域，稳定可用）
  async function loadWeibo() {
    const dom = document.getElementById("weibo")
    try {
      const res = await new Promise((resolve) => {
        const cb = "jsonp_weibo_" + Date.now()
        window[cb] = (data) => {
          delete window[cb]
          resolve(data)
        }
        const s = document.createElement("script")
        s.src = "https://www.coderutil.com/api/resou/v1/weibo.jsonp?callback=" + cb
        document.body.appendChild(s)
        setTimeout(() => document.body.removeChild(s), 3000)
      })
      const list = (res.data || []).slice(0, 15)
      dom.innerHTML = list.map((item, i) =>
        renderItem(i, item.word, item.hot + " 热度", item.url)
      ).join("")
    } catch (e) {
      dom.innerHTML = "<div class='loading'>加载失败</div>"
      console.error("微博加载失败:", e)
    }
  }

  // 抖音（通过聚合API获取，无跨域）
  async function loadDouyin() {
    const dom = document.getElementById("douyin")
    try {
      const apiUrl = encodeURIComponent("https://uapis.cn/api/v1/misc/hotboard?type=douyin")
      const res = await fetch(CORS_PROXY + apiUrl)
      const json = await res.json()
      const list = (json.data || []).slice(0, 15)
      dom.innerHTML = list.map((item, i) =>
        renderItem(i, item.title, item.hot + " 热度", item.url)
      ).join("")
    } catch (e) {
      dom.innerHTML = "<div class='loading'>加载失败</div>"
      console.error("抖音加载失败:", e)
    }
  }

  // B站（通过聚合API获取，无跨域）
  async function loadBilibili() {
    const dom = document.getElementById("bilibili")
    try {
      const apiUrl = encodeURIComponent("https://uapis.cn/api/v1/misc/hotboard?type=bilibili")
      const res = await fetch(CORS_PROXY + apiUrl)
      const json = await res.json()
      const list = (json.data || []).slice(0, 15)
      dom.innerHTML = list.map((item, i) =>
        renderItem(i, item.title, item.hot + " 热度", item.url)
      ).join("")
    } catch (e) {
      dom.innerHTML = "<div class='loading'>加载失败</div>"
      console.error("B站加载失败:", e)
    }
  }

  // 小红书（通过聚合API获取，无跨域）
  async function loadXiaohongshu() {
    const dom = document.getElementById("xiaohongshu")
    try {
      const apiUrl = encodeURIComponent("https://uapis.cn/api/v1/misc/hotboard?type=xiaohongshu")
      const res = await fetch(CORS_PROXY + apiUrl)
      const json = await res.json()
      const list = (json.data || []).slice(0, 15)
      dom.innerHTML = list.map((item, i) =>
        renderItem(i, item.title, item.hot + " 热度", item.url)
      ).join("")
    } catch (e) {
      // 兜底：直接跳转官方热榜
      dom.innerHTML = `
        <a href="https://www.xiaohongshu.com/hot" target="_blank">
          <div class="hot-item">
            <span class="num top1">1</span>
            <div class="text">点击进入小红书官方热榜</div>
          </div>
        </a>
      `
      console.error("小红书加载失败:", e)
    }
  }

  // 一次加载全部
  async function loadAll() {
    console.log("↻ 每" + REFRESH_MIN + "分钟自动刷新一次")
    loadWeibo()
    loadDouyin()
    loadBilibili()
    loadXiaohongshu()
  }

  // 首次加载 + 定时刷新
  loadAll()
  setInterval(loadAll, REFRESH_TIME)
</script>
</body>
</html>
